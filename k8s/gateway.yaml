# =============================================================================
# k8s/gateway.yaml — Level 3 Enterprise: Isartor Gateway on Kubernetes
#
# Deploys ONLY the stateless Rust gateway.
# Assumes GPU inference (SLM generation + embedding) services already exist
# in the cluster behind their own ClusterIP Services.
#
# Apply:
#   kubectl apply -f k8s/gateway.yaml
#
# Verify:
#   kubectl get all -n isartor
# =============================================================================

# ─────────────────────────────────────────────────────────────────────────────
# 0. Namespace
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: isartor
  labels:
    app.kubernetes.io/part-of: isartor

---
# ─────────────────────────────────────────────────────────────────────────────
# 1. ConfigMap — Non-sensitive gateway settings
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: isartor-gateway-config
  namespace: isartor
  labels:
    app.kubernetes.io/name: isartor-gateway
    app.kubernetes.io/component: config
data:
  # ── General ──────────────────────────────────────────────────────
  ISARTOR_HOST_PORT: "0.0.0.0:3000"
  RUST_LOG: "info,isartor=debug,tower_http=debug"

  # ── Layer 1 — Cache ─────────────────────────────────────────────
  ISARTOR_CACHE_MODE: "both"
  ISARTOR_EMBEDDING_MODEL: "all-minilm"
  ISARTOR_SIMILARITY_THRESHOLD: "0.92"
  ISARTOR_CACHE_TTL_SECS: "600"
  ISARTOR_CACHE_MAX_CAPACITY: "50000"

  # ── Layer 2 — Generation SLM (central inference service) ────────
  #    Replace these URLs with your cluster's inference Service DNS.
  ISARTOR_LAYER2__SIDECAR_URL: "http://slm-generation.inference.svc.cluster.local:8081"
  ISARTOR_LAYER2__MODEL_NAME: "phi-3-mini"
  ISARTOR_LAYER2__TIMEOUT_SECONDS: "30"

  # Legacy v1 path (same service, OpenAI-compat endpoint)
  ISARTOR_LOCAL_SLM_URL: "http://slm-generation.inference.svc.cluster.local:8081/v1/chat/completions"
  ISARTOR_LOCAL_SLM_MODEL: "phi-3-mini"

  # ── Embedding Service (central embedding pool) ──────────────────
  ISARTOR_EMBEDDING_SIDECAR__SIDECAR_URL: "http://slm-embedding.inference.svc.cluster.local:8082"
  ISARTOR_EMBEDDING_SIDECAR__MODEL_NAME: "all-minilm"
  ISARTOR_EMBEDDING_SIDECAR__TIMEOUT_SECONDS: "10"

  # ── Layer 3 — External LLM provider ────────────────────────────
  ISARTOR_LLM_PROVIDER: "openai"
  ISARTOR_EXTERNAL_LLM_MODEL: "gpt-4o-mini"
  ISARTOR_EXTERNAL_LLM_URL: "https://api.openai.com/v1/chat/completions"

  # ── Observability ───────────────────────────────────────────────
  ISARTOR_ENABLE_MONITORING: "true"
  ISARTOR_OTEL_EXPORTER_ENDPOINT: "http://otel-collector.monitoring.svc.cluster.local:4317"

  # ── Pipeline v2 Tuning ─────────────────────────────────────────
  ISARTOR_PIPELINE_EMBEDDING_DIM: "384"
  ISARTOR_PIPELINE_SIMILARITY_THRESHOLD: "0.92"
  ISARTOR_PIPELINE_RERANK_TOP_K: "5"
  ISARTOR_PIPELINE_MAX_CONCURRENCY: "512"
  ISARTOR_PIPELINE_MIN_CONCURRENCY: "8"
  ISARTOR_PIPELINE_TARGET_LATENCY_MS: "300"

---
# ─────────────────────────────────────────────────────────────────────────────
# 2. Secret — Sensitive credentials (skeleton — fill before applying)
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: isartor-gateway-secrets
  namespace: isartor
  labels:
    app.kubernetes.io/name: isartor-gateway
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # Gateway authentication key (Layer 0)
  ISARTOR_GATEWAY_API_KEY: "CHANGE-ME-BEFORE-DEPLOY"

  # Layer 3 — Cloud LLM API key
  ISARTOR_EXTERNAL_LLM_API_KEY: "sk-CHANGE-ME"

  # Azure OpenAI (uncomment if provider = azure)
  # ISARTOR_AZURE_DEPLOYMENT_ID: "your-deployment"
  # ISARTOR_AZURE_API_VERSION: "2024-08-01-preview"

---
# ─────────────────────────────────────────────────────────────────────────────
# 3. Deployment — 3-replica stateless gateway
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: isartor-gateway
  namespace: isartor
  labels:
    app.kubernetes.io/name: isartor-gateway
    app.kubernetes.io/component: gateway
spec:
  replicas: 3
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0          # zero-downtime deploys
  selector:
    matchLabels:
      app.kubernetes.io/name: isartor-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: isartor-gateway
        app.kubernetes.io/component: gateway
      annotations:
        # Forces a rollout when ConfigMap or Secret content changes.
        checksum/config: "REPLACE_WITH_SHA_IN_CI"
    spec:
      serviceAccountName: default
      terminationGracePeriodSeconds: 30

      securityContext:
        runAsNonRoot: true
        runAsUser: 65534           # nobody
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: gateway
          image: your-registry.io/isartor:v0.1.0   # ← replace with your image
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 3000
              protocol: TCP

          # Load non-sensitive config from the ConfigMap.
          envFrom:
            - configMapRef:
                name: isartor-gateway-config
            - secretRef:
                name: isartor-gateway-secrets

          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "128Mi"

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 2
            failureThreshold: 15   # up to 30 s for cold start

      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: isartor-gateway

---
# ─────────────────────────────────────────────────────────────────────────────
# 4. Service — ClusterIP on port 80 → container port 3000
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: isartor-gateway
  namespace: isartor
  labels:
    app.kubernetes.io/name: isartor-gateway
    app.kubernetes.io/component: gateway
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: isartor-gateway
  ports:
    - name: http
      port: 80
      targetPort: http        # resolves to container port 3000
      protocol: TCP
