# =============================================================================
# Isartor — One-Click Full Stack
#
# Everything you need in a single command: gateway, local AI sidecars,
# semantic cache, distributed tracing, metrics, and dashboards.
#
# Architecture:
#   Two lightweight llama.cpp sidecars (~30 MB each) replace Ollama (~1.5 GB):
#     • slm-generation (port 8081) — Phi-3-mini for triage / generation
#     • slm-embedding  (port 8082) — all-MiniLM-L6-v2 for embeddings
#
# Usage:
#   cd docker
#   docker compose -f docker-compose.full.yml up --build
#
# Endpoints:
#   Gateway (v1):  http://localhost:8080/api/chat
#   Gateway (v2):  http://localhost:8080/api/v2/chat
#   Health check:  http://localhost:8080/healthz
#   Jaeger UI:     http://localhost:16686
#   Grafana:       http://localhost:3000
#   Prometheus:    http://localhost:9090
#
# Tear down:
#   docker compose -f docker-compose.full.yml down -v
# =============================================================================

services:

  # ═══════════════════════════════════════════════════════════════════
  # 2. ISARTOR GATEWAY
  # ═══════════════════════════════════════════════════════════════════

  gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: isartor-gateway
    depends_on:
      otel-collector:
        condition: service_started
    ports:
      - "8000:8080"
    environment:
      # ── General ──────────────────────────────────────────────────
      ISARTOR_INFERENCE_ENGINE: "embedded"
      ISARTOR_HOST_PORT: "0.0.0.0:8080"
      ISARTOR_GATEWAY_API_KEY: "changeme"
      # ── Layer 1 — Semantic Cache ─────────────────────────────────
      ISARTOR_CACHE_MODE: "both"
      ISARTOR_EMBEDDING_MODEL: "all-minilm"
      ISARTOR_SIMILARITY_THRESHOLD: "0.85"
      ISARTOR_CACHE_TTL_SECS: "300"
      ISARTOR_CACHE_MAX_CAPACITY: "10000"
      # ── Layer 2 — Generation Sidecar (llama.cpp) ─────────────────
      ISARTOR__LAYER2__SIDECAR_URL: "http://slm-generation:8081"
      ISARTOR__LAYER2__MODEL_NAME: "phi-3-mini"
      ISARTOR__LAYER2__TIMEOUT_SECONDS: "30"
      # ── Embedding Sidecar (llama.cpp --embedding) ────────────────
      ISARTOR__EMBEDDING_SIDECAR__SIDECAR_URL: "http://slm-embedding:8082"
      ISARTOR__EMBEDDING_SIDECAR__MODEL_NAME: "all-minilm"
      ISARTOR__EMBEDDING_SIDECAR__TIMEOUT_SECONDS: "10"
      # ── Legacy Layer 2 (v1 middleware — points to generation sidecar)
      ISARTOR_LOCAL_SLM_URL: "http://slm-generation:8081/v1/chat/completions"
      ISARTOR_LOCAL_SLM_MODEL: "phi-3-mini"
      # ── Layer 3 — External LLM (override via .env.full) ─────────
      ISARTOR_LLM_PROVIDER: "${ISARTOR_LLM_PROVIDER:-openai}"
      ISARTOR_EXTERNAL_LLM_MODEL: "${ISARTOR_EXTERNAL_LLM_MODEL:-gpt-4o-mini}"
      ISARTOR_EXTERNAL_LLM_API_KEY: "${ISARTOR_EXTERNAL_LLM_API_KEY:-}"
      ISARTOR_EXTERNAL_LLM_URL: "${ISARTOR_EXTERNAL_LLM_URL:-https://api.openai.com/v1/chat/completions}"
      # ── Azure (pass-through, only used when provider=azure) ──────
      ISARTOR_AZURE_DEPLOYMENT_ID: "${ISARTOR_AZURE_DEPLOYMENT_ID:-}"
      ISARTOR_AZURE_API_VERSION: "${ISARTOR_AZURE_API_VERSION:-2024-08-01-preview}"
      # ── Observability ────────────────────────────────────────────
      ISARTOR_ENABLE_MONITORING: "true"
      ISARTOR_OTEL_EXPORTER_ENDPOINT: "http://otel-collector:4317"
      # ── Pipeline v2 Tuning ──────────────────────────────────────
      ISARTOR_PIPELINE_EMBEDDING_DIM: "384"
      ISARTOR_PIPELINE_SIMILARITY_THRESHOLD: "0.92"
      ISARTOR_PIPELINE_RERANK_TOP_K: "5"
      ISARTOR_PIPELINE_MAX_CONCURRENCY: "256"
      ISARTOR_PIPELINE_MIN_CONCURRENCY: "4"
      ISARTOR_PIPELINE_TARGET_LATENCY_MS: "500"
    env_file:
      - path: .env.full
        required: false
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
    volumes:
      - hf_models:/root/.cache/huggingface

  # ═══════════════════════════════════════════════════════════════════
  # 3. OBSERVABILITY STACK (lightweight images)
  # ═══════════════════════════════════════════════════════════════════

  # ── OpenTelemetry Collector ──────────────────────────────────────
  # Receives traces + metrics via OTLP gRPC from the gateway,
  # forwards traces to Jaeger and metrics to Prometheus.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: isartor-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"     # OTLP gRPC
    depends_on:
      jaeger:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

  # ── Jaeger — Distributed Tracing UI ──────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: isartor-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Prometheus — Metrics Storage ─────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: isartor-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
      - "--storage.tsdb.retention.size=512MB"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      otel-collector:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Grafana — Dashboards ─────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: isartor-grafana
    environment:
      # Zero-config anonymous access for local development
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      # Auto-provision data sources
      GF_DATASOURCES_DEFAULT_PROMETHEUS_URL: "http://prometheus:9090"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/etc/grafana/dashboards
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_started
      jaeger:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

# ═════════════════════════════════════════════════════════════════════
# VOLUMES
# ═════════════════════════════════════════════════════════════════════

volumes:
  slm_models:
    name: isartor-slm-models
  hf_models:
    name: isartor-hf-models
  prometheus_data:
    name: isartor-prometheus-data
  grafana_data:
    name: isartor-grafana-data
