name: Benchmark Suite

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  pull-requests: write
  contents: read

jobs:
  benchmark:
    name: Run Benchmark Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Build Isartor ──────────────────────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler cmake

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build Isartor (release)
        run: cargo build --release

      # ── Start Isartor and run harness ──────────────────────────────────────
      - name: Start Isartor server
        env:
          # Gateway auth — known key used by the harness below.
          ISARTOR__GATEWAY_API_KEY: benchmark-key
          # Azure OpenAI backend for L3 (cloud) requests.
          # Credentials are stored as repository secrets; the job skips L3 if unset.
          ISARTOR__LLM_PROVIDER: azure
          ISARTOR__EXTERNAL_LLM_URL: https://diggafoundry.openai.azure.com
          ISARTOR__EXTERNAL_LLM_MODEL: gpt-4o-mini
          ISARTOR__EXTERNAL_LLM_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          ISARTOR__AZURE_DEPLOYMENT_ID: gpt-4o-mini
          ISARTOR__AZURE_API_VERSION: "2024-08-01-preview"
        run: |
          ./target/release/isartor up &
          echo "ISARTOR_PID=$!" >> "$GITHUB_ENV"
          # Wait until the server is accepting connections (up to 30 s)
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Run benchmark suite
        id: bench
        timeout-minutes: 30
        env:
          ISARTOR_URL: http://localhost:8080
          ISARTOR_API_KEY: benchmark-key
        run: |
          python3 benchmarks/run.py --all \
            --url "$ISARTOR_URL" \
            --api-key "$ISARTOR_API_KEY" \
            --timeout 120 \
            --output benchmarks/results/ci_run.json \
            2>&1 | tee /tmp/bench_output.txt
          echo "bench_output<<EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/bench_output.txt >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Stop Isartor server
        if: always()
        run: |
          if [ -n "${ISARTOR_PID:-}" ]; then
            kill "$ISARTOR_PID" 2>/dev/null || true
          fi

      # ── Post results as a PR comment ───────────────────────────────────────
      - name: Post benchmark results as PR comment
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(
              fs.readFileSync('benchmarks/results/ci_run.json', 'utf8')
            );

            function pct(rate) {
              return (rate * 100).toFixed(1) + '%';
            }
            function ms(v) {
              return v != null ? v.toFixed(1) + ' ms' : '-';
            }

            let body = `## 📊 Isartor Benchmark Results\n\n`;
            body += `**Commit:** \`${context.sha.slice(0, 8)}\`  `;
            body += `**Hardware:** ${results.hardware}\n\n`;

            for (const [name, r] of Object.entries(results.fixtures)) {
              body += `### ${name}\n\n`;
              body += `| Layer              | Hits   | % of Traffic | Avg Latency (p50) |\n`;
              body += `|--------------------|--------|--------------|-------------------|\n`;
              body += `| L1a (exact)        | ${r.l1a_hits} | ${pct(r.l1a_rate)} | ${ms(r.l1a_p50_ms)} |\n`;
              body += `| L1b (semantic)     | ${r.l1b_hits} | ${pct(r.l1b_rate)} | ${ms(r.l1b_p50_ms)} |\n`;
              body += `| L2  (SLM)          | ${r.l2_hits}  | ${pct(r.l2_rate)}  | ${ms(r.l2_p50_ms)} |\n`;
              body += `| L3  (cloud)        | ${r.l3_hits}  | ${pct(r.l3_rate)}  | ${ms(r.l3_p50_ms)} |\n`;
              const deflHits = r.l1a_hits + r.l1b_hits + r.l2_hits;
              body += `| **Total deflected**| **${deflHits}** | **${pct(r.deflection_rate)}** | |\n`;
              body += `| **Cost saved**     |        |              | **$${r.cost_per_req_usd.toFixed(6)}/req** |\n`;
              body += `\n`;
              body += `> Overall latency — P50: ${ms(r.p50_ms)} | P95: ${ms(r.p95_ms)} | P99: ${ms(r.p99_ms)}\n\n`;
            }

            body += `---\n_Generated by the [Benchmark Suite workflow](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})_\n`;

            // Find and update an existing benchmark comment, or create a new one
            const marker = '## 📊 Isartor Benchmark Results';
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.data.find(
              c => c.user.login === 'github-actions[bot]' && c.body.startsWith(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      # ── Upload artefacts ───────────────────────────────────────────────────
      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmarks/results/ci_run.json

      # ── Dry-run validation (always runs, even without a server) ───────────
  validate-harness:
    name: Validate Benchmark Harness (dry-run)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run harness in dry-run mode
        run: python3 benchmarks/run.py --all --dry-run

      - name: Verify output file exists and is valid JSON
        run: |
          python3 - <<'PY'
          import json, sys
          with open("benchmarks/results/latest.json") as f:
              data = json.load(f)
          assert "fixtures" in data, "missing 'fixtures' key"
          for name, r in data["fixtures"].items():
              assert r["total_requests"] > 0, f"{name}: total_requests is 0"
              assert 0.0 <= r["deflection_rate"] <= 1.0, f"{name}: deflection_rate out of range"
          print("Harness output is valid JSON with expected schema.")
          PY

      - name: Run Claude Code three-way benchmark in dry-run mode
        run: |
          python3 benchmarks/claude_code_benchmark.py --dry-run \
            --output benchmarks/results/claude_code_benchmark.json \
            --report benchmarks/results/claude_code_benchmark_report.md
      - name: Run Claude Code + Copilot benchmark in dry-run mode
        run: python3 benchmarks/claude_code_benchmark.py --dry-run

      - name: Verify Claude Code benchmark output is valid JSON
        run: |
          python3 - <<'PY'
          import json
          with open("benchmarks/results/claude_code_benchmark.json") as f:
              data = json.load(f)
          assert data["benchmark"] == "claude_code_three_way", \
              f"unexpected benchmark name: {data['benchmark']!r}"
          for key in ("baseline", "isartor_cold", "isartor_warm"):
              assert key in data, f"missing key: {key!r}"
              r = data[key]
              assert r["total_requests"] > 0, f"{key}: total_requests is 0"
              assert 0.0 <= r["deflection_rate"] <= 1.0, \
                  f"{key}: deflection_rate out of range"
          b, c, w = data["baseline"], data["isartor_cold"], data["isartor_warm"]
          assert b["deflection_rate"] == 0.0, "baseline should have 0 deflection"
          assert c["deflection_rate"] < w["deflection_rate"], \
              "warm deflection should exceed cold deflection"
          print(
              f"Claude Code three-way benchmark output valid. "
              f"Cold: {c['deflection_rate']*100:.1f}%, Warm: {w['deflection_rate']*100:.1f}%"
          with open("benchmarks/results/claude_code_copilot.json") as f:
              data = json.load(f)
          assert data["benchmark"] == "claude_code_copilot", "unexpected benchmark name"
          assert "case_a" in data, "missing case_a"
          assert "case_b" in data, "missing case_b"
          a, b = data["case_a"], data["case_b"]
          assert a["total_requests"] > 0, "case_a: total_requests is 0"
          assert b["total_requests"] > 0, "case_b: total_requests is 0"
          assert a["deflection_rate"] == 0.0, "case_a: expected 0 deflection"
          assert 0.0 < b["deflection_rate"] <= 1.0, "case_b: deflection_rate out of range"
          assert b["l3_hits"] < b["total_requests"], "case_b: expected some deflection"
          print(
              f"Claude Code benchmark output valid. "
              f"Case B deflection rate: {b['deflection_rate'] * 100:.1f}%"
          )
          PY

      - name: Verify Markdown report was written
        run: |
          test -f benchmarks/results/claude_code_benchmark_report.md \
            || (echo "Markdown report not found" && exit 1)
          grep -q "Baseline" benchmarks/results/claude_code_benchmark_report.md \
            || (echo "Report missing Baseline section" && exit 1)
          grep -q "Cold Cache" benchmarks/results/claude_code_benchmark_report.md \
            || (echo "Report missing Cold Cache section" && exit 1)
          grep -q "Warm Cache" benchmarks/results/claude_code_benchmark_report.md \
            || (echo "Report missing Warm Cache section" && exit 1)
          echo "Markdown report present and contains all required sections."
          test -f benchmarks/results/claude_code_copilot_report.md \
            || (echo "Markdown report not found" && exit 1)
          grep -q "Case A" benchmarks/results/claude_code_copilot_report.md \
            || (echo "Report missing Case A section" && exit 1)
          grep -q "Case B" benchmarks/results/claude_code_copilot_report.md \
            || (echo "Report missing Case B section" && exit 1)
          echo "Markdown report is present and contains expected sections."
