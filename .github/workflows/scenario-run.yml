name: Scenario Runner — Code Generation Benchmark

# Two runner modes:
#   fixture:    Replays claude_code_todo_app.jsonl via HTTP
#   claude_cli: Real Claude Code CLI builds a TODO app end-to-end
#
# Both compare: Baseline (no optimization) vs Isartor (L1+L2+L3)
#
# Usage:
#   gh workflow run scenario-run.yml -f mode=dry_run
#   gh workflow run scenario-run.yml -f runner=claude_cli -f mode=both
#   gh workflow run scenario-run.yml -f mode=both -f issue_number=83

on:
  workflow_dispatch:
    inputs:
      runner:
        description: 'Runner type'
        required: true
        default: 'fixture'
        type: choice
        options:
          - 'fixture'
          - 'claude_cli'
      mode:
        description: 'Run mode'
        required: true
        default: 'dry_run'
        type: choice
        options:
          - 'dry_run'
          - 'isartor_only'
          - 'baseline_only'
          - 'both'
      request_count:
        description: 'Number of prompts for fixture runner (0 = all 78)'
        required: false
        default: '0'
        type: number
      max_turns:
        description: 'Max Claude turns for claude_cli runner'
        required: false
        default: '50'
        type: number
      issue_number:
        description: 'GitHub issue number to post results to (optional)'
        required: false
        type: number

permissions:
  issues: write
  contents: write

jobs:
  scenario-run:
    name: Code Generation Scenario Run
    runs-on: ubuntu-latest
    timeout-minutes: 180

    env:
      MODE: ${{ inputs.mode }}
      RUNNER: ${{ inputs.runner || 'fixture' }}
      REQUEST_COUNT: ${{ inputs.request_count || '0' }}
      MAX_TURNS: ${{ inputs.max_turns || '50' }}
      ISARTOR_API_KEY: benchmark-key

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        if: env.RUNNER == 'claude_cli'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Copilot CLI
        if: env.RUNNER == 'claude_cli'
        run: |
          npm install -g @github/copilot
          copilot --version

      # ── Post "started" comment ──────────────────────────────────────────
      - name: Post started comment
        if: inputs.issue_number
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const mode = process.env.MODE;
            const modeLabel = {
              dry_run: '🔵 Dry-run (simulated responses)',
              isartor_only: '🟡 Isartor-only',
              baseline_only: '🟠 Baseline-only',
              both: '🟢 Full comparison',
            }[mode] || mode;
            const body = [
              `## 🚀 Scenario Runner Started`,
              ``,
              `**Run:** [#${context.runId}](${runUrl})`,
              `**Mode:** ${modeLabel}`,
              `**Commit:** \`${context.sha.slice(0, 8)}\``,
              `**Prompts:** ${process.env.REQUEST_COUNT === '0' ? 'all 78' : process.env.REQUEST_COUNT}`,
              ``,
              `Scenarios:`,
              mode !== 'isartor_only' ? `- ⬜ **Baseline** — Claude Code + Copilot (no Isartor)` : '',
              mode !== 'baseline_only' ? `- ⬜ **Isartor** — Claude Code + Isartor + Copilot` : '',
            ].filter(Boolean).join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt(process.env.ISSUE_NUMBER),
              body,
            });
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}

      # ── Copilot auth (any live mode needs Copilot token) ─────────────────
      - name: Prepare Copilot authentication
        if: env.MODE != 'dry_run'
        id: copilot_auth_prepare
        env:
          COPILOT_KEY_SECRET: ${{ secrets.COPILOT_KEY || secrets.ISARTOR_COPILOT_TOKEN }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          def secret_has_copilot_access(token: str) -> tuple:
              req = urllib.request.Request(
                  "https://api.github.com/copilot_internal/v2/token",
                  headers={
                      "Authorization": f"token {token}",
                      "Accept": "application/json",
                      "User-Agent": "GitHubCopilotChat/0.29.1",
                  },
                  method="GET",
              )
              try:
                  with urllib.request.urlopen(req, timeout=30) as resp:
                      payload = json.loads(resp.read().decode("utf-8"))
              except urllib.error.HTTPError as exc:
                  return False, f"http_{exc.code}"
              return bool(payload.get("token")), "missing_token"

          def request_device_code() -> dict:
              payload = json.dumps({
                  "client_id": "Iv1.b507a08c87ecfe98",
                  "scope": "read:user",
              }).encode("utf-8")
              req = urllib.request.Request(
                  "https://github.com/login/device/code",
                  data=payload,
                  headers={
                      "Accept": "application/json",
                      "Content-Type": "application/json",
                  },
                  method="POST",
              )
              with urllib.request.urlopen(req, timeout=30) as resp:
                  return json.loads(resp.read().decode("utf-8"))

          secret = os.environ.get("COPILOT_KEY_SECRET", "")
          outputs = {}
          if secret:
              ok, reason = secret_has_copilot_access(secret)
              if ok:
                  outputs["auth_mode"] = "secret"
              else:
                  device = request_device_code()
                  with open("/tmp/copilot_device_code.json", "w") as fh:
                      json.dump(device, fh)
                  outputs["auth_mode"] = "device"
                  outputs["fallback_reason"] = reason
                  outputs["user_code"] = device["user_code"]
                  outputs["verification_uri"] = device["verification_uri"]
                  outputs["expires_in"] = str(device["expires_in"])
          else:
              device = request_device_code()
              with open("/tmp/copilot_device_code.json", "w") as fh:
                  json.dump(device, fh)
              outputs["auth_mode"] = "device"
              outputs["fallback_reason"] = "missing_secret"
              outputs["user_code"] = device["user_code"]
              outputs["verification_uri"] = device["verification_uri"]
              outputs["expires_in"] = str(device["expires_in"])

          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              for key, value in outputs.items():
                  out.write(f"{key}={value}\n")
          PY

      - name: Post device-flow login instructions
        if: |
          env.MODE != 'dry_run' &&
          steps.copilot_auth_prepare.outputs.auth_mode == 'device' &&
          inputs.issue_number
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          FALLBACK_REASON: ${{ steps.copilot_auth_prepare.outputs.fallback_reason }}
          USER_CODE: ${{ steps.copilot_auth_prepare.outputs.user_code }}
          VERIFICATION_URI: ${{ steps.copilot_auth_prepare.outputs.verification_uri }}
        with:
          script: |
            const body = [
              `## 🔐 GitHub Device Login Required`,
              ``,
              process.env.FALLBACK_REASON === 'missing_secret'
                ? `No Copilot key configured — manual device-flow login needed.`
                : `Copilot key invalid (${process.env.FALLBACK_REASON}) — falling back to device-flow.`,
              ``,
              `1. Open: ${process.env.VERIFICATION_URI}`,
              `2. Enter code: \`${process.env.USER_CODE}\``,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt(process.env.ISSUE_NUMBER),
              body,
            });

      - name: Resolve Copilot authentication
        if: env.MODE != 'dry_run'
        id: copilot_auth
        env:
          COPILOT_KEY_SECRET: ${{ secrets.COPILOT_KEY || secrets.ISARTOR_COPILOT_TOKEN }}
          COPILOT_WORKFLOW_KEY: ""
        run: |
          set -euo pipefail
          if [ "${{ steps.copilot_auth_prepare.outputs.auth_mode }}" = "secret" ]; then
            COPILOT_WORKFLOW_KEY="${COPILOT_KEY_SECRET}"
          else
            python3 - <<'PY'
          import json
          import time
          import urllib.request

          with open("/tmp/copilot_device_code.json", "r") as fh:
              device = json.load(fh)

          deadline = time.time() + max(int(device.get("expires_in", 900)), 300)
          interval = max(int(device.get("interval", 5)), 5)

          while time.time() < deadline:
              payload = json.dumps({
                  "client_id": "Iv1.b507a08c87ecfe98",
                  "device_code": device["device_code"],
                  "grant_type": "urn:ietf:params:oauth:grant-type:device_code",
              }).encode("utf-8")
              req = urllib.request.Request(
                  "https://github.com/login/oauth/access_token",
                  data=payload,
                  headers={
                      "Accept": "application/json",
                      "Content-Type": "application/json",
                  },
                  method="POST",
              )
              with urllib.request.urlopen(req, timeout=30) as resp:
                  body = json.loads(resp.read().decode("utf-8"))

              if body.get("access_token"):
                  with open("/tmp/copilot_workflow_key.txt", "w") as fh:
                      fh.write(body["access_token"])
                  raise SystemExit(0)

              err = body.get("error")
              if err in {"authorization_pending", "slow_down"}:
                  time.sleep(interval)
                  continue

              raise SystemExit(f"GitHub device login failed: {err or body}")

          raise SystemExit("Device login timed out.")
          PY
            COPILOT_WORKFLOW_KEY="$(cat /tmp/copilot_workflow_key.txt)"
          fi

          # Validate Copilot access
          python3 - <<'VALIDATE'
          import json, os, urllib.request, urllib.error
          token = os.environ.get("COPILOT_WORKFLOW_KEY", "")
          if not token:
              raise SystemExit("No Copilot token resolved")
          req = urllib.request.Request(
              "https://api.github.com/copilot_internal/v2/token",
              headers={
                  "Authorization": f"token {token}",
                  "Accept": "application/json",
                  "User-Agent": "GitHubCopilotChat/0.29.1",
              },
              method="GET",
          )
          try:
              with urllib.request.urlopen(req, timeout=30) as resp:
                  payload = json.loads(resp.read().decode("utf-8"))
          except urllib.error.HTTPError as exc:
              raise SystemExit(f"Copilot access check failed: HTTP {exc.code}")
          if not payload.get("token"):
              raise SystemExit("Copilot token did not produce a session token")
          print("✅ Copilot access validated")
          VALIDATE

          echo "COPILOT_WORKFLOW_KEY=${COPILOT_WORKFLOW_KEY}" >> "$GITHUB_ENV"

      # ── Build Isartor (live isartor scenarios) ──────────────────────────
      - name: Install system dependencies
        if: env.MODE == 'isartor_only' || env.MODE == 'both'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq protobuf-compiler cmake

      - name: Install Rust toolchain
        if: env.MODE == 'isartor_only' || env.MODE == 'both'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        if: env.MODE == 'isartor_only' || env.MODE == 'both'
        uses: Swatinem/rust-cache@v2

      - name: Build Isartor (release)
        if: env.MODE == 'isartor_only' || env.MODE == 'both'
        run: cargo build --release

      # ── Download Qwen 2.5 Coder 7B ─────────────────────────────────────
      - name: Download Qwen 2.5 Coder 7B GGUF
        if: env.MODE == 'isartor_only' || env.MODE == 'both'
        run: |
          mkdir -p ./models
          echo "Downloading Qwen 2.5 Coder 7B Q4_K_M GGUF (~4.7 GB)..."
          curl -fL \
            --retry 3 \
            --retry-delay 10 \
            --progress-bar \
            -C - \
            "https://huggingface.co/Qwen/Qwen2.5-Coder-7B-Instruct-GGUF/resolve/main/qwen2.5-coder-7b-instruct-q4_k_m.gguf" \
            -o "./models/qwen2.5-coder-7b-instruct-q4_k_m.gguf"
          echo "Download complete ($(du -h ./models/qwen2.5-coder-7b-instruct-q4_k_m.gguf | cut -f1))."

      # ── Install llama.cpp ───────────────────────────────────────────────
      - name: Install llama.cpp
        if: env.MODE == 'isartor_only' || env.MODE == 'both'
        run: |
          set -euo pipefail
          LLAMA_API_JSON=$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/ggml-org/llama.cpp/releases/latest)
          export LLAMA_API_JSON
          read -r LLAMA_VERSION LLAMA_ASSET_URL <<< \
            "$(python3 -c "
          import json, os, sys
          payload = json.loads(os.environ['LLAMA_API_JSON'])
          tag = payload.get('tag_name', '')
          assets = payload.get('assets', [])
          for name in (f'llama-{tag}-bin-ubuntu-x64.tar.gz', f'llama-{tag}-bin-ubuntu-x64.zip'):
              for a in assets:
                  if a.get('name') == name:
                      print(tag, a['browser_download_url']); sys.exit(0)
          sys.exit('No Linux x64 asset found')
          ")"
          echo "Installing llama.cpp ${LLAMA_VERSION} from ${LLAMA_ASSET_URL}"
          rm -rf /tmp/llama-cpp
          mkdir -p /tmp/llama-cpp
          case "$LLAMA_ASSET_URL" in
            *.tar.gz) curl -fsSL "$LLAMA_ASSET_URL" | tar -xz -C /tmp/llama-cpp ;;
            *.zip)    curl -fsSL "$LLAMA_ASSET_URL" -o /tmp/llama.zip && unzip -q /tmp/llama.zip -d /tmp/llama-cpp ;;
          esac
          LLAMA_SERVER_PATH=$(find /tmp/llama-cpp -type f -name llama-server | head -n 1)
          if [ -z "$LLAMA_SERVER_PATH" ]; then
            echo "::error::llama-server not found in archive"
            find /tmp/llama-cpp -maxdepth 3 -type f | head -30
            exit 1
          fi
          sudo mkdir -p /usr/local/llama-cpp
          sudo cp -a /tmp/llama-cpp/. /usr/local/llama-cpp/
          LLAMA_REL="${LLAMA_SERVER_PATH#/tmp/llama-cpp/}"
          LLAMA_SERVER_CMD="/usr/local/llama-cpp/${LLAMA_REL}"
          sudo ln -sf "$LLAMA_SERVER_CMD" /usr/local/bin/llama-server
          LLAMA_LIB_PATHS=$(find /usr/local/llama-cpp -type f \( -name '*.so' -o -name '*.so.*' \) -exec dirname {} \; | sort -u | paste -sd: -)
          echo "LLAMA_SERVER_CMD=${LLAMA_SERVER_CMD}" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=${LLAMA_LIB_PATHS}" >> "$GITHUB_ENV"
          LD_LIBRARY_PATH="${LLAMA_LIB_PATHS}" "$LLAMA_SERVER_CMD" --version

      # ── Start llama-server (Qwen L2 sidecar) ───────────────────────────
      - name: Start llama-server (Qwen L2)
        if: env.MODE == 'isartor_only' || env.MODE == 'both'
        run: |
          LD_LIBRARY_PATH="${LD_LIBRARY_PATH:-}" "${LLAMA_SERVER_CMD}" \
            --model ./models/qwen2.5-coder-7b-instruct-q4_k_m.gguf \
            --host 127.0.0.1 \
            --port 8090 \
            --ctx-size 4096 \
            --n-predict 2048 \
            >/tmp/llama-server.log 2>&1 &
          echo "LLAMA_PID=$!" >> "$GITHUB_ENV"

          echo "Waiting for llama-server to be ready..."
          for i in $(seq 1 120); do
            if curl -fsS http://127.0.0.1:8090/health > /dev/null 2>&1; then
              echo "✅ llama-server ready after ${i}s"
              break
            fi
            if [ "$i" -eq 120 ]; then
              echo "❌ llama-server failed to start"
              tail -30 /tmp/llama-server.log
              exit 1
            fi
            sleep 2
          done

      # ── Start Isartor with Qwen L2 (fixture runner only) ────────────────
      - name: Start Isartor gateway with Qwen L2
        if: (env.MODE == 'isartor_only' || env.MODE == 'both') && env.RUNNER != 'claude_cli'
        env:
          ISARTOR__GATEWAY_API_KEY: benchmark-key
          ISARTOR__LLM_PROVIDER: copilot
          ISARTOR__EXTERNAL_LLM_API_KEY: ${{ env.COPILOT_WORKFLOW_KEY }}
          ISARTOR__EXTERNAL_LLM_MODEL: gpt-4.1
          ISARTOR__EXTERNAL_LLM_URL: "https://api.githubcopilot.com/chat/completions"
          ISARTOR__ENABLE_SLM_ROUTER: "true"
          ISARTOR__LAYER2__SIDECAR_URL: "http://127.0.0.1:8090/v1"
          ISARTOR__LAYER2__CLASSIFIER_MODE: "tiered"
          ISARTOR__LAYER2__MAX_ANSWER_TOKENS: "2048"
          ISARTOR__OFFLINE_MODE: "false"
        run: |
          set -euo pipefail

          # Write minimal config to override repo defaults
          printf 'llm_provider = "copilot"\nexternal_llm_model = "gpt-4.1"\noffline_mode = false\nenable_slm_router = true\n\n[layer2]\nsidecar_url = "http://127.0.0.1:8090/v1"\nclassifier_mode = "tiered"\nmax_answer_tokens = 2048\n' > isartor.toml

          echo "LLM_PROVIDER=copilot, MODEL=gpt-4.1"
          echo "SLM_ROUTER=true, SIDECAR=http://127.0.0.1:8090/v1"
          echo "CLASSIFIER_MODE=tiered, MAX_ANSWER_TOKENS=2048"
          echo "EXTERNAL_LLM_API_KEY is $([ -n "${ISARTOR__EXTERNAL_LLM_API_KEY:-}" ] && echo 'set' || echo 'EMPTY')"

          ./target/release/isartor up --detach 2>&1 || true

          # Wait for health
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "✅ Isartor healthy after ${i}s"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "❌ Isartor failed to start within 30s"
              echo "=== Isartor logs (last 50 lines) ==="
              tail -50 ~/.isartor/isartor.log 2>/dev/null || echo "(no log file)"
              echo "=== Process check ==="
              ps aux | grep -i isartor | grep -v grep || echo "(no isartor process)"
              exit 1
            fi
            sleep 1
          done

      # ── Run scenario_runner ─────────────────────────────────────────────
      - name: Run scenario runner
        id: run
        run: |
          set -euo pipefail

          PUSH_ARGS=""
          if [ "${MODE}" != "dry_run" ]; then
            PUSH_TOKEN="${DIST_PUSH_TOKEN:-${GITHUB_TOKEN}}"
            PUSH_ARGS="--push-repo https://x-access-token:${PUSH_TOKEN}@github.com/isartor-ai/isartor-dist.git"
          fi

          if [ "${RUNNER}" = "claude_cli" ]; then
            # ── Real Claude Code CLI mode ──
            ARGS=""
            case "${MODE}" in
              dry_run)        ARGS="--dry-run" ;;
              isartor_only)   ARGS="--isartor-only" ;;
              baseline_only)  ARGS="--baseline-only" ;;
              both)           ARGS="" ;;
            esac

            python3 benchmarks/claude_bench.py \
              --cli copilot \
              --binary ./target/release/isartor \
              --copilot-token "${COPILOT_WORKFLOW_KEY:-}" \
              --model gpt-4.1 \
              --max-turns "${MAX_TURNS}" \
              --timeout 900 \
              --sidecar-url "http://127.0.0.1:8090/v1" \
              --output-dir results \
              ${ARGS} \
              ${PUSH_ARGS}
          else
            # ── Fixture replay mode (original) ──
            ARGS=""
            case "${MODE}" in
              dry_run)        ARGS="--dry-run" ;;
              isartor_only)   ARGS="--isartor-only --api-key ${ISARTOR_API_KEY}" ;;
              baseline_only)  ARGS="--baseline-only --copilot-token ${COPILOT_WORKFLOW_KEY:-none}" ;;
              both)           ARGS="--api-key ${ISARTOR_API_KEY} --copilot-token ${COPILOT_WORKFLOW_KEY:-none}" ;;
            esac

            REQ_ARGS=""
            if [ "${REQUEST_COUNT}" != "0" ]; then
              REQ_ARGS="--requests ${REQUEST_COUNT}"
            fi

            python3 benchmarks/scenario_runner.py \
              --output-dir results \
              --model gpt-4.1 \
              ${ARGS} \
              ${REQ_ARGS} \
              ${PUSH_ARGS}
          fi

          echo "output_dir=results" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ github.token }}
          DIST_PUSH_TOKEN: ${{ secrets.DIST_PUSH_TOKEN }}

      # ── Upload artifacts ────────────────────────────────────────────────
      - name: Upload scenario results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scenario-run-results
          path: |
            results/tokens.json
            results/code.diff
            results/summary.md
            results/full_results.json
          retention-days: 30

      - name: Upload generated workspaces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scenario-workspaces
          path: |
            results/workspace_baseline/
            results/workspace_isartor/
          retention-days: 14
          if-no-files-found: ignore

      # ── Post results to issue ───────────────────────────────────────────
      - name: Post results to issue
        if: always() && inputs.issue_number
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          OUTPUT_DIR: ${{ steps.run.outputs.output_dir || 'results' }}
          JOB_STATUS: ${{ job.status }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            let summaryContent = '';
            const summaryPath = path.join(process.env.OUTPUT_DIR, 'summary.md');
            if (fs.existsSync(summaryPath)) {
              summaryContent = fs.readFileSync(summaryPath, 'utf8');
            }

            let tokensInfo = '';
            const tokensPath = path.join(process.env.OUTPUT_DIR, 'tokens.json');
            if (fs.existsSync(tokensPath)) {
              try {
                const data = JSON.parse(fs.readFileSync(tokensPath, 'utf8'));
                if (data.comparison) {
                  const c = data.comparison;
                  tokensInfo = [
                    ``,
                    `### 💰 Token Savings`,
                    `| Metric | Value |`,
                    `|--------|-------|`,
                    `| Baseline cloud tokens | ${c.baseline_cloud_tokens.toLocaleString()} |`,
                    `| Isartor cloud tokens | ${c.isartor_cloud_tokens.toLocaleString()} |`,
                    `| **Tokens saved** | **${c.tokens_saved.toLocaleString()} (${c.savings_pct}%)** |`,
                  ].join('\n');
                }
              } catch {}
            }

            const statusIcon = process.env.JOB_STATUS === 'success' ? '✅' : '❌';
            const body = [
              `## ${statusIcon} Scenario Runner Complete`,
              ``,
              `**Run:** [#${context.runId}](${runUrl})`,
              `**Status:** ${process.env.JOB_STATUS}`,
              ``,
              summaryContent || '_No summary generated._',
              tokensInfo,
              ``,
              `📎 Full results available as [workflow artifacts](${runUrl}).`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt(process.env.ISSUE_NUMBER),
              body,
            });

      # ── Validate outputs (always, even on failure) ──────────────────────
      - name: Validate output artifacts
        if: always()
        run: |
          set -euo pipefail
          echo "=== Checking output files ==="
          for f in results/tokens.json results/summary.md results/full_results.json; do
            if [ -f "$f" ]; then
              echo "✅ $f exists ($(wc -c < "$f") bytes)"
            else
              echo "⚠️  $f not found"
            fi
          done

          if [ -f results/tokens.json ]; then
            python3 -c "
          import json, sys
          data = json.load(open('results/tokens.json'))
          print('✅ tokens.json is valid JSON')
          for scenario in ('baseline', 'isartor'):
              if scenario in data:
                  s = data[scenario]
                  # Support both fixture runner and claude_bench schemas
                  if 'total_input_tokens' in s:
                      total = s['total_input_tokens'] + s['total_output_tokens']
                      defl = s.get('deflection_rate_pct', 0)
                  elif 'claude' in s:
                      total = s['claude'].get('input_tokens',0) + s['claude'].get('output_tokens',0)
                      defl = s.get('isartor',{}).get('deflection_rate',0)
                  else:
                      total = 0; defl = 0
                  print(f'  {scenario}: {total:,} total tokens, deflection {defl}%')
          if 'comparison' in data:
              c = data['comparison']
              saved = c.get('tokens_saved', c.get('cloud_calls_saved', 0))
              pct = c.get('savings_pct', c.get('cloud_call_reduction_pct', 0))
              print(f'  savings: {saved:,} ({pct}%)')
          "
          fi
