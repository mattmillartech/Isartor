name: Rust CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler cmake

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all-features

  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    needs: check

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler cmake

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Generate coverage report
        # Run tarpaulin and capture any produced XML. Tarpaulin may emit
        # different XML filenames depending on version; locate any XML and
        # copy it to coverage/cobertura.xml so the Codecov uploader can find it.
        run: |
          set -euxo pipefail
          cargo install cargo-tarpaulin --force || true
          # Try common output format names; prefer XML output.
          if cargo tarpaulin --all-features --out Xml --output-dir coverage/; then
            echo "tarpaulin finished (Xml)"
          elif cargo tarpaulin --all-features --out xml --output-dir coverage/; then
            echo "tarpaulin finished (xml)"
          else
            echo "tarpaulin failed — continue to collect any partial outputs"
          fi

          # Normalize any discovered XML report to cobertura.xml for Codecov
          mkdir -p coverage
          report=$(ls coverage/*.xml 2>/dev/null | head -n1 || true)
          if [ -n "$report" ]; then
            cp "$report" coverage/cobertura.xml
            echo "Copied $report -> coverage/cobertura.xml"
          else
            echo "No XML coverage report found in coverage/"
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/cobertura.xml
          fail_ci_if_error: false

