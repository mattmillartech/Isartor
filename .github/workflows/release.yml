name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build (${{ matrix.os }} / ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          # Linux (musl, static)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
          # macOS (universal)
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          # Windows
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    env:
      PROJECT_NAME: isartor
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}

      # Belt-and-suspenders: explicitly add the target in case the action's
      # `targets` parameter is ignored in certain runner environments.
      - name: Ensure target is installed
        shell: bash
        run: rustup target add ${{ matrix.target }}

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cross (Linux only)
        if: runner.os == 'Linux'
        run: |
          cargo install cross --git https://github.com/cross-rs/cross

      - name: Build release binary
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Get version from tag
        id: version
        shell: bash
        run: |
          echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Rename and compress binary
        id: compress
        shell: bash
        run: |
          BIN_NAME="${{ env.PROJECT_NAME }}"
          VERSION="${{ steps.version.outputs.tag }}"
          TARGET="${{ matrix.target }}"
          if [ "${{ runner.os }}" = "Windows" ]; then
            ARCHIVE="${BIN_NAME}-${VERSION}-${TARGET}.zip"
            7z a "${ARCHIVE}" "./target/${TARGET}/release/${BIN_NAME}.exe"
          else
            ARCHIVE="${BIN_NAME}-${VERSION}-${TARGET}.tar.gz"
            tar -czf "${ARCHIVE}" -C "target/${TARGET}/release" "${BIN_NAME}"
          fi
          echo "archive=${ARCHIVE}" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-${{ steps.version.outputs.tag }}-${{ matrix.target }}
          path: ${{ steps.compress.outputs.archive }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: List artifacts
        run: ls -lh dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            ## Zero-Config Quick Start

            ### Docker (no API key required)
            ```bash
            docker run -p 8080:8080 ghcr.io/isartor-ai/isartor:latest
            ```
            > Image size: ~120 MB compressed. Startup: < 30 s. Health: `GET http://localhost:8080/health`

            ### macOS / Linux — single command
            ```bash
            curl -fsSL https://raw.githubusercontent.com/isartor-ai/Isartor/main/install.sh | sh
            ```

            ### Windows (PowerShell) — single command
            ```powershell
            irm https://raw.githubusercontent.com/isartor-ai/Isartor/main/install.ps1 | iex
            ```

            ### After installation
            ```bash
            isartor          # start the server on port 8080
            isartor demo     # replay 50 demo prompts, print deflection table (no API key needed)
            isartor init     # generate a commented config scaffold
            ```

            ## Binaries

            | Platform | File |
            |----------|------|
            | Linux x86_64 (musl) | `isartor-${{ github.ref_name }}-x86_64-unknown-linux-musl.tar.gz` |
            | Linux arm64 (musl)  | `isartor-${{ github.ref_name }}-aarch64-unknown-linux-musl.tar.gz` |
            | macOS x86_64        | `isartor-${{ github.ref_name }}-x86_64-apple-darwin.tar.gz` |
            | macOS arm64 (M1/M2) | `isartor-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz` |
            | Windows x86_64      | `isartor-${{ github.ref_name }}-x86_64-pc-windows-msvc.zip` |

          files: |
            dist/**/*.tar.gz
            dist/**/*.zip

  docker:
    name: Publish Docker Image
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU (for arm64)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/isartor-ai/isartor:latest
            ghcr.io/isartor-ai/isartor:${{ steps.version.outputs.tag }}
