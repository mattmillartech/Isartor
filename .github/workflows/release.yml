name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      targets:
        description: 'Build targets (linux,macos,all)'
        required: false
        default: 'all'
        type: choice
        options:
          - linux
          - macos
          - all
      publish_latest:
        description: 'Also push ghcr.io/isartor-ai/isartor:latest (main only)'
        required: false
        default: false
        type: boolean


jobs:
  meta:
    name: Compute release tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      docker_tag: ${{ steps.tag.outputs.docker_tag }}
      is_tag: ${{ steps.tag.outputs.is_tag }}
    steps:
      - name: Determine tag (tag push vs dev run)
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            echo "tag=${TAG}" >> $GITHUB_OUTPUT
            echo "docker_tag=${TAG#v}" >> $GITHUB_OUTPUT
            echo "is_tag=true" >> $GITHUB_OUTPUT
          else
            TAG="dev-${{ github.run_id }}"
            echo "tag=${TAG}" >> $GITHUB_OUTPUT
            echo "docker_tag=${TAG}" >> $GITHUB_OUTPUT
            echo "is_tag=false" >> $GITHUB_OUTPUT
          fi

  build:
    name: Build (${{ matrix.os }} / ${{ matrix.target }})
    needs: meta
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux (musl, static) - fastest & cheapest
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            if: ${{ github.event_name != 'workflow_dispatch' || inputs.targets == 'linux' || inputs.targets == 'all' }}
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            if: ${{ github.event_name != 'workflow_dispatch' || inputs.targets == 'linux' || inputs.targets == 'all' }}
          # macOS (only on main/tags, most expensive)
          - os: macos-latest
            target: x86_64-apple-darwin
            if: ${{ (github.event_name != 'workflow_dispatch' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))) || (github.event_name == 'workflow_dispatch' && (inputs.targets == 'macos' || inputs.targets == 'all')) }}
          - os: macos-latest
            target: aarch64-apple-darwin
            if: ${{ (github.event_name != 'workflow_dispatch' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))) || (github.event_name == 'workflow_dispatch' && (inputs.targets == 'macos' || inputs.targets == 'all')) }}

    env:
      PROJECT_NAME: isartor
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Belt-and-suspenders: explicitly add the target in case the action's
      # `targets` parameter is ignored in certain runner environments.
      - name: Ensure target is installed
        shell: bash
        run: rustup target add ${{ matrix.target }}

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cross (Linux only)
        if: runner.os == 'Linux'
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build release binary
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Get version
        id: version
        shell: bash
        run: |
          echo "tag=${{ needs.meta.outputs.tag }}" >> $GITHUB_OUTPUT

      - name: Rename and compress binary
        id: compress
        shell: bash
        run: |
          BIN_NAME="${{ env.PROJECT_NAME }}"
          VERSION="${{ steps.version.outputs.tag }}"
          TARGET="${{ matrix.target }}"
          if [ "${{ runner.os }}" = "Windows" ]; then
            ARCHIVE="${BIN_NAME}-${VERSION}-${TARGET}.zip"
            7z a "${ARCHIVE}" "./target/${TARGET}/release/${BIN_NAME}.exe"
          else
            ARCHIVE="${BIN_NAME}-${VERSION}-${TARGET}.tar.gz"
            tar -czf "${ARCHIVE}" -C "target/${TARGET}/release" "${BIN_NAME}"
          fi
          echo "archive=${ARCHIVE}" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-${{ steps.version.outputs.tag }}-${{ matrix.target }}
          path: ${{ steps.compress.outputs.archive }}

  release:
    name: Create GitHub Release
    needs: [build, meta]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: isartor-${{ needs.meta.outputs.tag }}-*
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist

      - name: Determine release tag
        id: tag
        shell: bash
        run: |
          echo "tag_name=${{ needs.meta.outputs.tag }}" >> $GITHUB_OUTPUT
          if [[ "${{ needs.meta.outputs.is_tag }}" == "true" ]]; then
            echo "is_dev=false" >> $GITHUB_OUTPUT
          else
            echo "is_dev=true" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag_name }}
          generate_release_notes: ${{ steps.tag.outputs.is_dev != 'true' }}
          draft: ${{ steps.tag.outputs.is_dev == 'true' }}
          fail_on_unmatched_files: false
          body: |
            ## Zero-Config Quick Start

            ### Docker (no API key required)
            ```bash
            docker run -p 8080:8080 ghcr.io/isartor-ai/isartor:latest
            ```
            > Image size: ~120 MB compressed. Startup: < 30 s. Health: `GET http://localhost:8080/health`

            ### macOS / Linux — single command

            Public repo:
            ```bash
            curl -fsSL https://raw.githubusercontent.com/isartor-ai/Isartor/main/install.sh | sh
            ```

            Private repo (recommended):
            ```bash
            gh auth login
            gh api -H "Accept: application/vnd.github.raw" /repos/isartor-ai/Isartor/contents/install.sh?ref=main | sh
            ```

            ### Windows (PowerShell) — single command

            Public repo:
            ```powershell
            irm https://raw.githubusercontent.com/isartor-ai/Isartor/main/install.ps1 | iex
            ```

            Private repo (recommended):
            ```powershell
            gh auth login
            gh api -H "Accept: application/vnd.github.raw" /repos/isartor-ai/Isartor/contents/install.ps1?ref=main | iex
            ```

            ### After installation
            ```bash
            isartor          # start the server on port 8080
            isartor demo     # replay 50 demo prompts, print deflection table (no API key needed)
            isartor init     # generate a commented config scaffold
            ```

            ## Binaries

            | Platform | File |
            |----------|------|
            | Linux x86_64 (musl) | `isartor-${{ steps.tag.outputs.tag_name }}-x86_64-unknown-linux-musl.tar.gz` |
            | Linux arm64 (musl)  | `isartor-${{ steps.tag.outputs.tag_name }}-aarch64-unknown-linux-musl.tar.gz` |
            | macOS x86_64        | `isartor-${{ steps.tag.outputs.tag_name }}-x86_64-apple-darwin.tar.gz` |
            | macOS arm64 (M1/M2) | `isartor-${{ steps.tag.outputs.tag_name }}-aarch64-apple-darwin.tar.gz` |
            | Windows x86_64      | `isartor-${{ steps.tag.outputs.tag_name }}-x86_64-pc-windows-msvc.zip` |

          files: |
            dist/**/*.tar.gz
            dist/**/*.zip

  docker:
    name: Publish Docker Image
    needs: [build, meta]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Linux build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-linux
          pattern: isartor-${{ needs.meta.outputs.tag }}-*-unknown-linux-musl

      - name: Prepare prebuilt binaries for Docker
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p docker-dist

          for tgz in $(find dist-linux -type f -name '*.tar.gz'); do
            if [[ "$tgz" == *x86_64-unknown-linux-musl.tar.gz ]]; then
              arch=amd64
            elif [[ "$tgz" == *aarch64-unknown-linux-musl.tar.gz ]]; then
              arch=arm64
            else
              continue
            fi

            tmpdir="$(mktemp -d)"
            tar -xzf "$tgz" -C "$tmpdir"
            mv "$tmpdir/isartor" "docker-dist/isartor-${arch}"
            chmod +x "docker-dist/isartor-${arch}"
            rm -rf "$tmpdir"
          done

          test -f docker-dist/isartor-amd64
          test -f docker-dist/isartor-arm64

          file docker-dist/isartor-amd64 docker-dist/isartor-arm64
          file docker-dist/isartor-amd64 | grep -q 'statically linked'
          file docker-dist/isartor-arm64 | grep -q 'statically linked'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute Docker tags
        id: docker_tags
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ needs.meta.outputs.docker_tag }}"
          PUBLISH_LATEST="${{ needs.meta.outputs.is_tag == 'true' || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && github.event.inputs.publish_latest == 'true') }}"

          echo "tags<<EOF" >> $GITHUB_OUTPUT
          echo "ghcr.io/isartor-ai/isartor:${TAG}" >> $GITHUB_OUTPUT
          if [[ "$PUBLISH_LATEST" == "true" ]]; then
            echo "ghcr.io/isartor-ai/isartor:latest" >> $GITHUB_OUTPUT
          fi
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: runtime-prebuilt
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.docker_tags.outputs.tags }}
