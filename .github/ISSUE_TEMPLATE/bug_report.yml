name: Bug Report
description: Something is broken
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. The more detail you provide,
        the faster it gets fixed.
  - type: input
    id: version
    attributes:
      label: Isartor Version
      placeholder: "0.1.0 (run: isartor --version)"
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: Deployment Method
      options:
        - Docker (docker run)
        - Binary (curl install)
        - Built from source (cargo build)
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux x86_64
        - macOS ARM (Apple Silicon)
        - macOS x86_64
        - Windows
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: "Describe what went wrong"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run docker run ...
        2. Send request ...
        3. See error ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      render: shell
